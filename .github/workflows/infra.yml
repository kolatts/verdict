name: Provision infrastructure (Bicep)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/**'

permissions:
  id-token: write   # required for OIDC login
  contents: read

jobs:
  deploy-infra:
    name: Deploy Bicep template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-verdict
          template: infra/main.bicep
          parameters: infra/main.parameters.json
          failOnStdErr: false

      # Tables are created automatically on first cold start via Program.cs (CreateTableIfNotExistsAsync).
      # No explicit table provisioning step needed here.
