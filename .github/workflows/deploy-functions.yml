name: Build, test & deploy Azure Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'infra/**'
      - '.github/workflows/deploy-functions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'infra/**'
      - '.github/workflows/deploy-functions.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build-test:
    name: Build & unit test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/Verdict.Functions/Verdict.Functions.csproj

      - name: Build
        run: dotnet build src/Verdict.Functions/Verdict.Functions.csproj -c Release --no-restore

      - name: Publish (create deployment artifact)
        run: dotnet publish src/Verdict.Functions/Verdict.Functions.csproj -c Release --no-build -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-publish
          path: ./publish
          include-hidden-files: true

  e2e-test:
    name: Reqnroll E2E (3-player, Playwright)
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Setup Node 22 (Azurite + http-server)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Azurite and http-server
        run: npm install -g azurite http-server

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Build Functions (Release)
        run: dotnet build src/Verdict.Functions/Verdict.Functions.csproj -c Release

      - name: Build E2E tests
        run: dotnet build tests/Verdict.E2E/Verdict.E2E.csproj -c Release

      - name: Install Playwright browsers
        run: pwsh tests/Verdict.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start dev stack (Azurite + Functions + static server)
        run: |
          mkdir -p .azurite-test
          azurite --silent --location .azurite-test &
          sleep 3

          # local.settings.json must live next to the binary so func start
          # picks up the CORS wildcard (browser polls from :8080 -> :7071).
          printf '%s' '{"IsEncrypted":false,"Values":{"AzureWebJobsStorage":"UseDevelopmentStorage=true","FUNCTIONS_WORKER_RUNTIME":"dotnet-isolated","TableConnection":"UseDevelopmentStorage=true"},"Host":{"LocalHttpPort":7071,"CORS":"*","CORSCredentials":false}}' > src/Verdict.Functions/bin/Release/net10.0/local.settings.json

          cd src/Verdict.Functions/bin/Release/net10.0
          func start --no-build --dotnet-isolated &
          cd ../../../../..

          http-server docs -p 8080 -c-1 --silent &
          sleep 20   # .NET cold start needs ~15-20 s on GitHub runners

      - name: Run Reqnroll E2E tests
        run: >
          dotnet test tests/Verdict.E2E/Verdict.E2E.csproj
          -c Release
          --no-build
          --logger trx
          --results-directory TestResults
        env:
          CI_SERVERS_RUNNING: "true"

      - name: Upload screenshots and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            TestResults/
            tests/Verdict.E2E/bin/Release/net10.0/TestResults/screenshots/

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: e2e-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: functions-publish
          path: ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep) and configure Function App
        run: |
          # --- 1. Deploy storage + App Insights via Bicep (idempotent) --------
          # The consumption plan and function app are NOT in the Bicep template.
          # ARM preflight validation incorrectly checks Y1/Dynamic plans against
          # VM quotas on VS Enterprise (quota = 0), blocking the deployment even
          # though serverless uses no VMs. Creating via CLI bypasses this check.
          DEPLOY_OUT=$(az deployment group create \
            --resource-group rg-verdict \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --mode Incremental \
            --query properties.outputs \
            -o json)

          STORAGE_ACCOUNT=$(echo "$DEPLOY_OUT" | jq -r '.storageAccountName.value')
          AI_CONNECTION=$(echo "$DEPLOY_OUT" | jq -r '.appInsightsConnectionString.value')

          # --- 2. Build storage connection string from key --------------------
          STORAGE_KEY=$(az storage account keys list \
            --account-name "$STORAGE_ACCOUNT" \
            --resource-group rg-verdict \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            --query '[0].value' -o tsv)
          STORAGE_CONN="DefaultEndpointsProtocol=https;AccountName=${STORAGE_ACCOUNT};AccountKey=${STORAGE_KEY};EndpointSuffix=core.windows.net"

          # --- 3. Create function app if it does not exist -------------------
          # --consumption-plan-location skips ARM preflight and creates the Y1
          # plan + site directly, without the VM quota check that blocks Bicep.
          if ! az functionapp show \
              --name verdict-backend \
              --resource-group rg-verdict \
              --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
              --output none 2>/dev/null; then
            az functionapp create \
              --name verdict-backend \
              --resource-group rg-verdict \
              --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
              --consumption-plan-location eastus \
              --runtime dotnet-isolated \
              --runtime-version 10 \
              --functions-version 4 \
              --storage-account "$STORAGE_ACCOUNT" \
              --os-type Windows \
              --https-only true
          fi

          # --- 4. Sync app settings (idempotent) ----------------------------
          az functionapp config appsettings set \
            --name verdict-backend \
            --resource-group rg-verdict \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            --settings \
              "AzureWebJobsStorage=$STORAGE_CONN" \
              "FUNCTIONS_EXTENSION_VERSION=~4" \
              "FUNCTIONS_WORKER_RUNTIME=dotnet-isolated" \
              "TableConnection=$STORAGE_CONN" \
              "APPLICATIONINSIGHTS_CONNECTION_STRING=$AI_CONNECTION" \
              "WEBSITE_USE_PLACEHOLDER_DOTNETISOLATED=1"

          # --- 5. Ensure CORS origins are present ---------------------------
          az functionapp cors add \
            --name verdict-backend \
            --resource-group rg-verdict \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            --allowed-origins \
              "https://kolatts.github.io" \
              "http://localhost:8080" \
              "http://127.0.0.1:5500" \
            2>/dev/null || true

      - name: Zip and deploy to Function App
        run: |
          cd ./publish && zip -r ../publish.zip . && cd ..
          az functionapp deployment source config-zip \
            --name verdict-backend \
            --resource-group rg-verdict \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            --src publish.zip
